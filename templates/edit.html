<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Note | NotesApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="fas fa-file-alt me-2"></i>NotesApp
        </a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1 class="main-title" style="text-align: left; font-size: 2rem;">Edit Note</h1>
            
            <div class="pro-card">
                <form action="/update/{{ note_id }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Note Title</label>
                        <input type="text"
                               name="title"
                               class="form-control"
                               value="{{ note.title }}"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Content</label>
                        <textarea name="content"
                                  class="form-control"
                                  rows="8"
                                  required>{{ note.content }}</textarea>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a href="/" class="btn btn-light border">Cancel</a>
                        <button type="submit" class="btn btn-primary px-4">
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 Simple Notes App</p>
</footer>

</body>
</html>
