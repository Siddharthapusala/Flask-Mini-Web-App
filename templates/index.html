<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App | Simple & Professional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="fas fa-file-alt me-2"></i>NotesApp
        </a>
    </div>
</nav>

<div class="container">
    <h1 class="main-title">My Personal Notes</h1>
    <div class="pro-card">
        <h5 class="note-form-title">Create a new note</h5>
        <form id="add-note-form" action="/add" method="POST">
            <div class="mb-3">
                <input id="note-title-input" type="text" name="title" class="form-control" placeholder="Note Title" required>
            </div>
            <div class="mb-3">
                <textarea id="note-content-input" name="content" class="form-control" rows="4" placeholder="Type your note content here..." required></textarea>
            </div>
            <div class="text-end">
                <button id="save-note-btn" type="submit" class="btn btn-primary">
                    <i class="fas fa-plus me-2"></i>Add Note
                </button>
            </div>
        </form>
    </div>
    <div class="notes-header">
        <h2 class="notes-section-title">Saved Notes <span>({{ notes|length }} total)</span></h2>
    </div>

    {% if notes %}
        <div class="notes-list">
            {% for note in notes %}
            <div class="note-item">
                <h4>{{ note.title }}</h4>
                <p>{{ note.content }}</p>
                <div class="note-actions">
                    <a href="/edit/{{ loop.index0 }}" class="btn btn-outline-warning btn-sm-custom">
                        <i class="fas fa-edit me-1"></i>Edit
                    </a>
                    <a href="/delete/{{ loop.index0 }}"
                       class="btn btn-outline-danger btn-sm-custom"
                       onclick="return confirm('Are you sure you want to delete this note?')">
                        <i class="fas fa-trash me-1"></i>Delete
                    </a>
                </div>
            </div>
            {% endfor %}
        </div>
    {% else %}
        <div class="empty-state">
            <i class="fas fa-folder-open"></i>
            <p class="mb-0">You don't have any notes yet. Add one above to get started!</p>
        </div>
    {% endif %}

</div>

</body>
</html>
